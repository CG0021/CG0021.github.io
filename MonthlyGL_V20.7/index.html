<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Monthly GL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <script src="js/auth.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden flex items-center justify-center">
    <!-- Login Overlay Screen -->
    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-white/10 backdrop-blur-[8px] transition-all duration-300 overflow-hidden">
        <!-- Canvas for Dynamic Smoke Animation -->
        <canvas id="loginSmokeCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>
        
        <!-- Glassmorphism Glowing Background Circles -->
        <div class="absolute w-[380px] h-[380px] rounded-full bg-sky-400/10 blur-[85px] top-[-60px] left-[-60px] pointer-events-none animate-pulse duration-[7000ms]"></div>
        <div class="absolute w-[450px] h-[450px] rounded-full bg-blue-600/8 blur-[100px] bottom-[-120px] right-[-60px] pointer-events-none animate-pulse duration-[9000ms]"></div>
        <div class="absolute w-[280px] h-[280px] rounded-full bg-emerald-400/10 blur-[80px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

        <!-- Glassmorphic Login Card -->
        <div class="relative w-full max-w-md bg-white/70 backdrop-blur-3xl rounded-3xl shadow-[0_30px_70px_rgba(15,23,42,0.12)] border border-white/60 overflow-hidden transform transition-all flex flex-col p-8 z-10">
            <div class="text-center mb-6 select-none">
                <img src="pic/logo.png" alt="Logo" class="w-24 h-24 object-contain rounded-full mx-auto mb-4 shadow-[0_8px_25px_rgba(14,165,233,0.15)] border border-white/20 transform hover:scale-105 transition-all duration-300">
                <h2 class="text-2xl font-black text-slate-800 leading-tight">CFOMOPH.COM</h2>
                <p class="text-xs text-slate-500 mt-1 font-semibold">เข้าสู่ระบบเพื่อใช้งานระบบวิเคราะห์ดัชนีการเงิน</p>
            </div>

            <form id="loginForm" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-wider pl-1">บัญชีผู้ใช้งาน (Username)</label>
                    <input type="text" id="loginUsername" required placeholder="ระบุชื่อผู้ใช้" class="bg-white/40 backdrop-blur-sm border border-slate-200/50 text-slate-800 text-sm rounded-xl focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 focus:bg-white/70 block w-full p-3 font-semibold transition-all placeholder-slate-400/80 shadow-sm" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-wider pl-1">รหัสผ่าน (Password)</label>
                    <input type="password" id="loginPassword" required placeholder="ระบุรหัสผ่าน" class="bg-white/40 backdrop-blur-sm border border-slate-200/50 text-slate-800 text-sm rounded-xl focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 focus:bg-white/70 block w-full p-3 font-semibold transition-all placeholder-slate-400/80 shadow-sm" />
                </div>

                <div id="loginErrorMsg" class="hidden text-xs text-rose-700 font-extrabold bg-rose-500/10 backdrop-blur-md border border-rose-200/40 p-3.5 rounded-xl shadow-sm"></div>

                <button type="submit" id="loginSubmitBtn" class="w-full bg-gradient-to-r from-sky-500 to-sky-600 hover:from-sky-600 hover:to-sky-700 text-white font-bold p-3.5 rounded-xl transition-all shadow-[0_4px_15px_rgba(14,165,233,0.3)] mt-2 flex items-center justify-center focus:outline-none hover:scale-[1.02] active:scale-[0.98] transform duration-150 border border-white/10">
                    เข้าสู่ระบบ
                </button>
            </form>

            <!-- Developer Credit -->
            <div class="text-center mt-6 text-[10px] text-slate-400 font-bold select-none border-t border-slate-200/20 pt-4">
                ออกแบบและพัฒนาโดย ดร.นพ.ชุมพล นุชผ่อง
            </div>
        </div>
    </div>
</body>
</html>

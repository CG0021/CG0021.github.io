<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TPS System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-lg: 1rem;
            --font-th: 'Sarabun', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-th);
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #e0f2fe, transparent),
                radial-gradient(circle at bottom left, #f1f5f9, transparent);
        }

        .login-card {
            background: var(--bg-surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            animation: slideUp 0.5s ease-out;
            margin: 1rem;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--primary-color);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-family: var(--font-th);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: var(--font-th);
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-message {
            color: #ef4444;
            background-color: #fef2f2;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            border: 1px solid #fee2e2;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <h1>เข้าสู่ระบบ</h1>
            <p>กรุณาลงชื่อเข้าใช้งาน TPS System</p>
        </div>

        <div id="errorMessage" class="error-message">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">ชื่อผู้ใช้งาน</label>
                <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน" required>
            </div>
            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
            </div>
            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script>
        // ใส่ URL ของ Google Apps Script ที่ Deploy ใหม่ที่นี่
        const AUTH_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3_E1dRhy-c9Fxl3U01imF6817qPANiEDCFzNCijMwygIrJvIP7kMbeR5Ljul6ty-1/exec';

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('errorMessage');

            // แสดงสถานะการโหลด
            btn.disabled = true;
            btn.innerText = 'กำลังตรวจสอบ...';
            errorMsg.style.display = 'none';

            // เรียกใช้ Apps Script ผ่าน JSONP
            const script = document.createElement('script');
            const callbackName = 'auth_callback_' + Math.round(Math.random() * 1000000);

            window[callbackName] = function (response) {
                delete window[callbackName];
                document.body.removeChild(script);

                if (response.success) {
                    // เก็บ Token ที่ได้รับจาก Server
                    localStorage.setItem('tps_is_logged_in', 'true');
                    localStorage.setItem('tps_auth_token', response.token);
                    window.location.href = 'TPS_Analysis.html';
                } else {
                    errorMsg.innerText = response.message || 'รหัสผ่านไม่ถูกต้อง';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'เข้าสู่ระบบ';
                }
            };

            script.src = `${AUTH_SCRIPT_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&callback=${callbackName}`;
            document.body.appendChild(script);
        });

        // หากล็อคอินอยู่แล้ว ให้ไปหน้าหลัก
        if (localStorage.getItem('tps_is_logged_in') === 'true') {
            window.location.href = 'TPS_Analysis.html';
        }
    </script>
</body>

</html>

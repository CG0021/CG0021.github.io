<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth.js"></script>
    <title>Revenue Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Financial_Structure.css">
    <script src="hospital_data.js"></script>
    <script src="cmi_data.js"></script>
    <script src="ppfs_data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="header">
        <h1>
            <span
                style="background:var(--primary-color); color:white; padding:4px 8px; border-radius:6px; font-size: 1rem;">
                Revenue Analysis</span>
            <span>วิเคราะห์รายได้โรงพยาบาล</span>
        </h1>
        <div class="nav-buttons">
            <a href="Financial_Structure.html" class="nav-btn">Financial Structure</a>
            <a href="TPS_Analysis.html" class="nav-btn">TPS Analysis</a>
            <a href="Revenue_Analysis.html" class="nav-btn active">Revenue Analysis</a>
            <a href="Financial_Blueprint.html" class="nav-btn">Financial Blueprint</a>
            
            <button onclick="logout()" class="nav-btn"
                style="color: #ef4444; border: 1px solid #fee2e2;">ออกจากระบบ</button>
        </div>
    </div>

    <div class="search-container" style="display: flex; justify-content: center; padding: 1rem 2rem;">
        <!-- Unified Search Card -->
        <div class="search-bar-card"
            style="display: flex; align-items: center; gap: 0.8rem; background: white; padding: 0.5rem 1.5rem; border-radius: 50px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); border: 1px solid #e2e8f0; width: 100%; max-width: 1200px; flex-wrap: wrap;">

            <!-- Filters -->
            <div style="display:flex; align-items:center; gap: 0.8rem;">
                <div class="filter-group" style="gap: 4px; display: flex; align-items: center;">
                    <label style="font-size:0.9rem; white-space:nowrap; font-weight: 600; color: #64748b;">เขต:</label>
                    <select id="regionFilter" onchange="updateRegionDependents()"
                        style="width: 80px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <div class="filter-group" style="gap: 4px; display: flex; align-items: center;">
                    <label
                        style="font-size:0.9rem; white-space:nowrap; font-weight: 600; color: #64748b;">จังหวัด:</label>
                    <select id="provinceFilter" onchange="updateProvinceDependents()"
                        style="width: 110px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <div class="filter-group" style="gap: 4px; display: flex; align-items: center;">
                    <label
                        style="font-size:0.9rem; white-space:nowrap; font-weight: 600; color: #64748b;">กลุ่ม:</label>
                    <select id="groupFilter" onchange="applyFilters()"
                        style="width: 110px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <!-- Year Range Selectors -->
                <div class="filter-group" style="gap: 4px; display: flex; align-items: center; margin-left: 0.5rem;">
                    <label style="font-size:0.9rem; white-space:nowrap; font-weight: 600; color: #64748b;">ปี:</label>
                    <select id="startYear" onchange="handleYearChange()"
                        style="width: 80px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                    </select>
                    <span style="color: #64748b; font-weight: 600;">-</span>
                    <select id="endYear" onchange="handleYearChange()"
                        style="width: 80px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                    </select>
                </div>
            </div>

            <!-- Divider -->
            <div style="width: 1px; height: 24px; background: #cbd5e1; margin: 0 0.2rem;"></div>

            <!-- Search Input -->
            <div class="search-input-group" style="flex: 1; padding: 0; min-width: 200px; border:none;">
                <span class="search-icon" style="font-size: 1rem;">🔍</span>
                <input type="text" id="searchInput" placeholder="ค้นหาและเลือกโรงพยาบาลเพื่อเปรียบเทียบ..." disabled
                    autocomplete="off" style="font-size: 0.95rem; width: 100%;" onfocus="showSuggestions()"
                    onclick="event.stopPropagation(); showSuggestions()" oninput="applyFilters(); showSuggestions();">
                <div class="input-spinner" id="searchSpinner" style="display: block;"></div>
                <div class="suggestions" id="suggestions"></div>
            </div>

        </div>
    </div>

    <main class="main-content" id="mainContent" style="padding: 1rem 2rem;">
        <div class="welcome-message">
            <div style="font-size: 4rem; margin-bottom: 1rem;">💰</div>
            <h2>ระบบวิเคราะห์เปรียบเทียบรายได้โรงพยาบาล (Revenue Analysis & Comparison)</h2>
            <p>กรุณาค้นหาและเลือกโรงพยาบาลเพื่อเปรียบเทียบข้อมูลรายได้</p>
        </div>
    </main>

    <!-- Modal for Yearly Trends -->
    <div id="trendModal" onclick="handleBackdropClick(event)" style="display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center;">
        <div onclick="event.stopPropagation()" style="background-color: white; border-radius: 16px; width: 95%; max-width: 1200px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; animation: slideDown 0.3s ease-out;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 1.8rem; border-bottom: 1px solid #e2e8f0; background: #f8fafc; flex-wrap: wrap; gap: 10px;">
                <h3 id="modalTitle" style="margin: 0; font-size: 1.25rem; font-weight: 700; color: #1e293b; font-family: 'Sarabun', sans-serif;">แนวโน้มรายได้รายปี</h3>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div id="modalHeaderControls" style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;"></div>
                    <button onclick="closeTrendModal()" style="background: none; border: none; font-size: 1.5rem; font-weight: bold; cursor: pointer; color: #64748b; padding: 0 5px; display: flex; align-items: center; justify-content: center;" title="ปิด">✕</button>
                </div>
            </div>
            <div id="modalBody" style="padding: 1.8rem;">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <script>
        function handleBackdropClick(event) {
            if (event.target === document.getElementById('trendModal')) {
                closeTrendModal();
            }
        }
    </script>

    <style>
        @keyframes slideDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .comparison-table th, .comparison-table td {
            padding: 1rem;
            vertical-align: middle;
            border-bottom: 1px solid #e2e8f0;
        }
        .comparison-table tr:hover {
            background-color: #f8fafc;
        }
    </style>

    <script src="Revenue_Analysis.js"></script>
</body>

</html>

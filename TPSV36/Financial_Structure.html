<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth.js"></script>
    <title>Financial Statements Structure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Financial_Structure.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="hospital_data.js"></script>
</head>

<body>
    <div class="header">
        <h1>
            <span
                style="background:var(--primary-color); color:white; padding:4px 8px; border-radius:6px; font-size: 1rem;">
                Financial Statements Structure</span>
            <span>โครงสร้างงบการเงินโรงพยาบาล</span>
        </h1>
        <div class="nav-buttons">
            <a href="Financial_Structure.html" class="nav-btn active">Financial Structure</a>
            <a href="TPS_Analysis.html" class="nav-btn">TPS Analysis</a>
            <a href="TPS_Monthly.html" class="nav-btn">Monthly Report</a>
            <button onclick="logout()" class="nav-btn"
                style="color: #ef4444; border: 1px solid #fee2e2;">ออกจากระบบ</button>
        </div>
    </div>

    <div class="search-container" style="display: flex; justify-content: center; padding: 1rem 2rem;">
        <!-- Unified Search Card -->
        <div class="search-bar-card"
            style="display: flex; align-items: center; gap: 0.8rem; background: white; padding: 0.5rem 1.5rem; border-radius: 50px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); border: 1px solid #e2e8f0; width: 100%; max-width: 1200px; flex-wrap: wrap;">

            <!-- Filters -->
            <div style="display:flex; align-items:center; gap: 0.8rem;">
                <div class="filter-group" style="gap: 4px; display: flex; align-items: center;">
                    <label style="font-size:0.9rem; white-space:nowrap; font-weight: 600; color: #64748b;">เขต:</label>
                    <select id="regionFilter" onchange="updateRegionDependents()"
                        style="width: 80px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <div class="filter-group" style="gap: 4px; display: flex; align-items: center;">
                    <label
                        style="font-size:0.9rem; white-space:nowrap; font-weight: 600; color: #64748b;">จังหวัด:</label>
                    <select id="provinceFilter" onchange="updateProvinceDependents()"
                        style="width: 110px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <div class="filter-group" style="gap: 4px; display: flex; align-items: center;">
                    <label
                        style="font-size:0.9rem; white-space:nowrap; font-weight: 600; color: #64748b;">กลุ่ม:</label>
                    <select id="groupFilter" onchange="applyFilters()"
                        style="width: 110px; padding: 0.3rem; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 6px; background-color: #f8fafc;">
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
            </div>

            <!-- Divider -->
            <div style="width: 1px; height: 24px; background: #cbd5e1; margin: 0 0.2rem;"></div>

            <!-- Search Input -->
            <div class="search-input-group" style="flex: 1; padding: 0; min-width: 200px; border:none;">
                <span class="search-icon" style="font-size: 1rem;">🔍</span>
                <input type="text" id="searchInput" placeholder="พิมพ์ชื่อหรือรหัสโรงพยาบาล..." disabled
                    autocomplete="off" style="font-size: 0.95rem; width: 100%;" onfocus="showSuggestions()"
                    onclick="event.stopPropagation(); showSuggestions()" oninput="applyFilters(); showSuggestions();">
                <div class="input-spinner" id="searchSpinner" style="display: block;"></div>
                <div class="suggestions" id="suggestions"></div>
            </div>

            <!-- Divider -->
            <div style="width: 1px; height: 24px; background: #cbd5e1; margin: 0 0.2rem;"></div>

            <!-- Access Code -->
            <div id="accessCodeWrapper" style="display: flex; align-items: center; gap: 6px; padding-left: 0.5rem;">
                <span title="รหัสเข้าถึง" style="cursor:help;">📘</span>
                <input type="password" id="accessCode" placeholder="รหัส" autocomplete="off"
                    style="border: none; outline: none; width: 60px; background: transparent; font-size: 0.9rem;"
                    oninput="applyFilters()">
            </div>

        </div>
    </div>
    </div>

    <main class="main-content" id="mainContent">
        <div class="welcome-message">
            <div style="font-size: 4rem; margin-bottom: 1rem;">📊</div>
            <h2>ระบบเปรียบเทียบรายโรงพยาบาล</h2>
            <p>กรุณาค้นหาและเลือกโรงพยาบาลเพื่อเริ่มการเปรียบเทียบ</p>
        </div>
    </main>

    <div id="loading" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="reportModalTitle">รายงานเปรียบเทียบ ผ่าน/ไม่ผ่าน</h2>
                <span class="close-modal" onclick="closeReportModal()"
                    style="font-size:24px; cursor:pointer; padding:5px;">&times;</span>
            </div>
            <div class="modal-body" id="reportModalBody">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script src="Financial_Structure.js"></script>
</body>

</html>

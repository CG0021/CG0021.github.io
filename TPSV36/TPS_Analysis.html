        function renderLegendGroupHTML(group, flatItemsMap) {
            const itemsHTML = group.collapsed ? '' : group.items.map(itemId => {
                const data = flatItemsMap[itemId];
                return data ? renderLegendItemHTML(data, true) : '';
            }).join('');

            // Determine Group Visibility State (if all items hidden, group is hidden-mode)
            const isAllVisible = !group.items.some(itemId => {
                const data = flatItemsMap[itemId];
                return window.chartHiddenDatasets.has(itemId) || (data && data.hospCode && window.hiddenHospCodes.has(data.hospCode));
            });

            const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#0ea5e9"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            const eyeClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#94a3b8"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

            return `
                <div class="legend-group" 
                     ondragover="dragOver(event)" 
                     ondrop="dropLegendItem(event, '__GROUP__${group.id}')">
                    <div class="legend-group-header" 
                         onclick="toggleGroupCollapse('${group.id}')" 
                         style="cursor: pointer; user-select: none;">
                        <button class="group-toggle-btn" style="pointer-events:none; font-size:0.7rem; margin-right:4px;" title="ย่อ/ขยาย">
                            ${group.collapsed ? '▶' : '▼'}
                        </button>
                        <span style="font-weight:600; font-size:0.9rem; flex:1; color:#334155;">${group.name || 'กลุ่มข้อมูล'}</span>
                        <div style="display:flex; gap:4px;">
                            <button class="group-toggle-btn" 
                                onclick="event.stopPropagation(); toggleGroupVisibility('${group.id}', ${!isAllVisible})"
                                style="font-size:1.1rem; display:flex; align-items:center; justify-content:center; width:24px; height:24px;">
                                ${isAllVisible ? eyeOpen : eyeClosed}

                    <div class="legend-group-items" style="display:${group.collapsed ? 'none' : 'block'}">
                        ${itemsHTML}

        }

        // --- Drag & Drop Handlers ---

        function dragStart(e, id) {
            e.dataTransfer.setData("text/plain", id);
            e.dataTransfer.effectAllowed = "move";
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            const target = e.target.closest('.legend-item, .legend-group');
            if (target) {
                target.classList.add('drag-over-target');
            }
        }

        document.addEventListener('dragleave', (e) => {
            const target = e.target.closest('.legend-item, .legend-group');
            if (target) target.classList.remove('drag-over-target');
        }, true);

        // Remove highlight on drop is handled by re-render, but good to have listener to clean up if cancelled
        document.addEventListener('dragend', (e) => {
            document.querySelectorAll('.drag-over-target').forEach(el => el.classList.remove('drag-over-target'));
        });

        function dropLegendItem(e, targetId) {
            e.preventDefault();
            e.stopPropagation();

            const sourceId = e.dataTransfer.getData("text/plain");
            if (!sourceId || sourceId === targetId) return;

            let struct = window.chartLegendStructure;
            const flatMap = window.currentChartData ? window.currentChartData.flatItemsMap : {};

            // Helper: Generate Group Name
            const generateGroupName = (ids) => {
                const uniqueNames = new Set();
                ids.forEach(id => {
                    const item = flatMap[id];
                    if (!item) return;
                    // Logic for Name: "HospName" usually.
                    let name = item.label;
                    if (name.includes(' - ')) name = name.split(' - ')[0]; // Remove indicator part if multi

                    // Simple cleaning for names
                    name = name.replace(/^โรงพยาบาล/, '').replace(/^รพ\./, '').trim();
                    if (name) uniqueNames.add(name);
                });
                const arr = Array.from(uniqueNames);
                // Just join first 2
                const n1 = arr[0] || '';
                const n2 = arr[1] || '';
                if (!n1) return 'กลุ่มข้อมูล';
                return `${n1}${n2 ? ', ' + n2 : ''}`;
            };

            // Remove logic
            let sourceItem = null;
            // 1. Check top
            const topIdx = struct.findIndex(x => x === sourceId);
            if (topIdx !== -1) {
                sourceItem = struct[topIdx];
                struct.splice(topIdx, 1);
            } else {
                // 2. Check groups
                struct.forEach(g => {
                    if (g.type === 'group') {
                        const idx = g.items.indexOf(sourceId);
                        if (idx !== -1) {
                            sourceItem = g.items[idx];
                            g.items.splice(idx, 1); // Remove id string
                        }
                    }
                });
            }
            if (!sourceItem) sourceItem = sourceId; // Fallback if it was just an id string (normal case)

            // Target Logic
            if (targetId === '__ROOT__') {
                struct.push(sourceId);
            } else if (targetId.startsWith('__GROUP__')) {
                const groupId = targetId.replace('__GROUP__', '');
                const group = struct.find(x => x.type === 'group' && x.id === groupId);
                if (group) {
                    group.items.push(sourceId);
                    group.collapsed = false;
                } else {
                    struct.push(sourceId);
                }
            } else {
                // Determine insertion point
                // Is target top level or in group?
                const targetIdx = struct.findIndex(x => x === targetId);
                if (targetIdx !== -1) {
                    // Target is root item -> Make group
                    const newItems = [targetId, sourceId];
                    const newGroup = {
                        type: 'group',
                        id: 'g_' + Date.now(),
                        name: generateGroupName(newItems),
                        items: newItems,
                        collapsed: false
                    };
                    struct[targetIdx] = newGroup;
                } else {
                    // check inside groups
                    let handled = false;
                    struct.forEach(g => {
                        if (g.type === 'group') {
                            const idx = g.items.indexOf(targetId);
                            if (idx !== -1) {
                                g.items.splice(idx + 1, 0, sourceId);
                                handled = true;
                            }
                        }
                    });
                    if (!handled) struct.push(sourceId);
                }
            }

            // Cleanup & Persist
            const finalStruct = [];
            const newSavedGroups = [];

            struct.forEach(x => {
                if (x.type === 'group') {
                    if (x.items.length < 2) {
                        // Explode
                        if (x.items.length === 1) finalStruct.push(x.items[0]);
                    } else {
                        finalStruct.push(x);
                        // Persist logic: Save HospCodes
                        const hospCodes = new Set();
                        x.items.forEach(itemId => {
                            const item = flatMap[itemId];
                            if (item) hospCodes.add(item.hospCode);
                        });
                        newSavedGroups.push({
                            id: x.id,
                            name: x.name,
                            collapsed: x.collapsed,
                            hospCodes: Array.from(hospCodes)
                        });
                    }
                } else {
                    finalStruct.push(x);
                }
            });

            window.chartLegendStructure = finalStruct;
            window.savedChartGroups = newSavedGroups; // Update global state

            renderChartLegend();
        }

        function toggleGroupCollapse(groupId) {
            const group = window.chartLegendStructure.find(x => x.type === 'group' && x.id === groupId);
            if (group) {
                group.collapsed = !group.collapsed;
                // Update Persistence
                const saved = window.savedChartGroups.find(g => g.id === groupId);
                if (saved) saved.collapsed = group.collapsed;
                renderChartLegend();
            }
        }

        function toggleGroupVisibility(groupId, show) {
            const group = window.chartLegendStructure.find(x => x.type === 'group' && x.id === groupId);
            if (group && window.currentChartData) {
                // Auto-expand group to show the items we just toggled
                group.collapsed = false;

                group.items.forEach(itemId => {
                    const data = window.currentChartData.flatItemsMap[itemId];
                    if (data) {
                        if (show) {
                            window.chartHiddenDatasets.delete(itemId);
                            if (data.hospCode) window.hiddenHospCodes.delete(data.hospCode);
                        } else {
                            window.chartHiddenDatasets.add(itemId);
                            if (data.hospCode) window.hiddenHospCodes.add(data.hospCode);
                        }
                    }
                });
                renderChartLegend();
                renderComparisonChart();
            }
        }

                    '1.3.1.4': { main: 'S_1.3.1.4_ค่ายา', ref: 'S_1.3.1.4_Avg#ค่ายา', label: 'ค่ายา', refLabel: 'Avg ค่ายา' },
                    '1.3.1.5': { main: 'S_1.3.1.5_ค่าวัสดุวิทยาศาสตร์และการแพทย์', ref: 'S_1.3.1.5_Avg#ค่าวัสดุวิทยาศาสตร์และการแพทย์', label: 'ค่าวัสดุวิทย์ฯ', refLabel: 'Avg ค่าวัสดุ' },
                    '1.3.1.6': { main: 'S_1.3.1.6_ค่าเวชภัณฑ์มิใช่ยาและวัสดุการแพทย์', ref: 'S_1.3.1.6_Avg#ค่าเวชภัณฑ์มิใช่ยาและวัสดุการแพทย์', label: 'ค่าเวชภัณฑ์มิใช่ยา', refLabel: 'Avg ค่าเวชภัณฑ์' },
                    '1.3.2': { main: 'S_1.3.2_ผลรวมแม่ข่าย', ref: 300, label: 'คะแนนตรวจสอบ', refLabel: 'Target 300' },
                    '1.3.3.1': { main: 'S_1.3.3.1_อัตราครองเตียง', ref: 80, label: 'อัตราครองเตียง', refLabel: 'Target 80' },
                    '1.3.3.2': { main: 'S_1.3.3.2_Sum AdjRW', ref: 'S_1.3.3.2_ค่ากลางกลุ่ม AdjRW', label: 'SumAdjRW', refLabel: 'ค่ากลางกลุ่ม' },
                    '2.1.1': { main: 'S_2.1.1_Operating Margin %', ref: 'S_2.1.1_ค่ากลางOperating Margin %', label: 'Operating Margin %', refLabel: 'Median' },
                    '2.1.2': { main: 'S_2.1.2_Return on Asset %', ref: 'S_2.1.2_ค่ากลางReturn on Asset %', label: 'Return on Asset %', refLabel: 'Median' },
                    '2.1.3': { main: 'รายได้ (ไม่รวมงบลงทุน) หัก ค่าใช้จ่าย (ไม่รวมค่าเสื่อมราคาและค่าตัดจำหน่าย) EBITDA', label: 'EBITDA' }
                };

                let matchKey = null;
                for (let key in configMap) {
                    if (input.includes(key)) { matchKey = key; break; }
                }

                if (matchKey) {
                    const cfg = configMap[matchKey];
                    mainLabel = labelInput;

                    // Specific handling for 1.3.2 (Scores) - disable zones/areas completely as requested
                    if (matchKey === '1.3.2') {
                        indicators = [{ code: cfg.main, label: cfg.label }];
                        // No targetZones, No variable zones
                    }
                    else if (['1.3.1.1', '1.3.1.2', '1.3.1.3', '1.3.1.4', '1.3.1.5', '1.3.1.6', '2.1.1', '2.1.2', '1.3.3.2'].includes(matchKey)) {
                        // Enable Variable Zone Chart (Main Line + Area)
                        isVariableZoneChart = true;
                        indicators = [
                            { code: 'Main', fullHeader: cfg.main, label: cfg.label },
                            { code: 'Ref', fullHeader: cfg.ref, label: cfg.refLabel }
                        ];
                    }
                    else if (typeof cfg.ref === 'number') {
                        // Static Zone (Target Line)
                        indicators = [{ code: cfg.main, label: cfg.label }];
                        targetZones = [{ max: cfg.ref, label: cfg.refLabel, color: '#fef08a40' }];
                    } else if (cfg.ref) {
                        // Standard Multi-Line (No Area Fill)
                        indicators = [
                            { code: 'Main', fullHeader: cfg.main, label: cfg.label },
                            { code: 'Ref', fullHeader: cfg.ref, label: cfg.refLabel }
                        ];
                        isMulti = true;
                    } else if (matchKey === '2.1.3') {
                        // EBITDA: Show red zone for values < 0
                        indicators = [{ code: cfg.main, label: cfg.label }];
                        targetZones = [{ max: 0, label: 'EBITDA < 0', color: 'rgba(239, 68, 68, 0.2)' }];
                    } else {
                        // Others (No Zones)
                        indicators = [{ code: cfg.main, label: cfg.label }];
                    }
                } else {
                    // Fallback for generic 1.3 items not mapped
                    indicators = [{ code: input, label: labelInput }];
                    mainLabel = labelInput;
                }

            } else if (typeof input === 'string' && (input.startsWith('1.2.1 ') || input.startsWith('1.2.2 ') || input.startsWith('1.2.3 ') || input.startsWith('1.2.4 '))) {
                // Zone Charts
                let dataHeader = input;
                // Map input title to actual data header column
                if (input.startsWith('1.2.1 ')) dataHeader = 'S_1.2.1_ระยะเวลาชำระเจ้าหนี้การค้ายา&เวชภัณฑ์มิใช่ยา';
                else if (input.startsWith('1.2.2 ')) dataHeader = 'S_1.2.2_ระยะเวลาถัวเฉลี่ยในการเรียกเก็บหนี้สิทธิ UC';
                else if (input.startsWith('1.2.3 ')) dataHeader = 'S_1.2.3_ระยะเวลาถัวเฉลี่ยในการเรียกเก็บหนี้สิทธิข้าราชการ';
                else if (input.startsWith('1.2.4 ')) dataHeader = 'S_1.2.4_การบริหารสินค้าคงคลัง (Inventory Management)';

                indicators = [{ code: dataHeader, label: labelInput }];
                mainLabel = labelInput;

                // Define Zones with Transparent Colors
                if (input.startsWith('1.2.1 ')) {
                    targetZones = [
                        { max: 180, label: 'Target (Cash R < 0.8) ≤ 180', color: '#fef08a40' },
                        { max: 90, label: 'Target (Cash R ≥ 0.8) ≤ 90', color: '#bbf7d040' }
                    ];
                } else {
                    targetZones = [
                        { max: 60, label: 'Target ≤ 60', color: '#bbf7d040' }
                    ];
                }

            } else if (Array.isArray(input)) {
                indicators = input;
                mainLabel = "เปรียบเทียบ " + indicators.length + " รายการ";
                isMulti = true;
            } else {
                indicators = [{ code: input, label: labelInput }];
                mainLabel = labelInput;
            }

            const selectedHospitals = comparisonList.filter(h => !h.isLoading).map(h => ({
                code: h.code,
                name: h.name,
                visible: true
            }));

            if (selectedHospitals.length === 0) return;

            const allChartData = {};
            let allKeys = new Set();
            const yearQuarterInfo = {};

            selectedHospitals.forEach(hosp => {
                const hospital = comparisonList.find(c => c.code === hosp.code);
                if (!hospital) return;

                let dataToUse, headersMapToUse;
                dataToUse = hospital.data || {};
                headersMapToUse = hospital.headersMap || {};

                const allRows = Object.values(dataToUse);
                if (!allChartData[hosp.code]) allChartData[hosp.code] = {};

                indicators.forEach(ind => {
                    const chartData = {};
                    allRows.forEach(row => {
                        if (!row) return;

                        let h = null;
                        for (let year in headersMapToUse) {
                            const headers = headersMapToUse[year];
                            const yIdx = headers.findIndex(sh => String(sh).trim() === 'ปี');
                            const rowYear = String(row[yIdx >= 0 ? yIdx : 2] || '').trim();
                            if (rowYear === String(year)) {
                                h = headers;
                                break;
                            }
                        }
                        if (!h) h = Object.values(headersMapToUse)[0];

                        const yIdx = h ? h.findIndex(sh => String(sh).trim() === 'ปี') : 2;
                        const qIdx = h ? h.findIndex(sh => String(sh).trim() === 'ไตรมาส') : 3;

                        const year = String(row[yIdx >= 0 ? yIdx : 2] || '').trim();
                        const quarter = String(row[qIdx >= 0 ? qIdx : 3] || '').trim();

                        const headerToFind = ind.fullHeader || ind.code;

                        const val = getCell(row, headerToFind, h);
                        const numVal = val !== '-' ? parseFloat(String(val).replace(/,/g, '')) : null;

                        if (numVal !== null && !isNaN(numVal)) {
                            const key = `${year} Q${quarter}`;
                            if (!chartData[key]) {
                                chartData[key] = { num: numVal, raw: val };
                                yearQuarterInfo[key] = { year, quarter };
                            }
                            allKeys.add(key);
                        }
                    });
                    allChartData[hosp.code][ind.code] = chartData;
                });
            });

            const keys = Array.from(allKeys).sort((a, b) => {
                const partsA = a.split(' ');
                const partsB = b.split(' ');
                const yA = parseInt(partsA[0]);
                const yB = parseInt(partsB[0]);
                if (yA !== yB) return yA - yB;
                return partsA[1].localeCompare(partsB[1]);
            });
            const labels = keys;
            const tableLabels = [...labels].reverse();

            // Generate Flat Items for Legend (Group Logic)
            const flatItems = [];
            const flatItemsMap = {};

            selectedHospitals.forEach((h, hIdx) => {
                if (isBandChart || isVariableZoneChart) {
                    const color = getChartColor(hIdx);
                    // Use consistent ID structure
                    const dsKey = isVariableZoneChart ? `${h.code}|Main` : `${h.code}|Actual`; // Must match ID used in drag/drop
                    const toggleKey = isVariableZoneChart ? 'Main' : 'Consolidated';
                    // We need a unique ID for the legend item. 
                    // renderLegendItemHTML uses 'data.id'.
                    // toggleDatasetVisibility uses (el, hospCode, indCode).

                    const item = {
                        id: dsKey,
                        hospCode: h.code,
                        indCode: toggleKey,
                        label: h.name,
                        color: color,
                        globalIdx: hIdx
                    };
                    flatItems.push(item);
                    flatItemsMap[item.id] = item;
                } else {
                    indicators.forEach((ind, iIdx) => {
                        const globalIdx = hIdx * indicators.length + iIdx;
                        const color = getChartColor(globalIdx);
                        const dsKey = `${h.code}|${ind.code}`;
                        const item = {
                            id: dsKey,
                            hospCode: h.code,
                            indCode: ind.code,
                            label: isMulti ? `${h.name} - ${ind.label}` : h.name,
                            color: color,
                            globalIdx: globalIdx
                        };
                        flatItems.push(item);
                        flatItemsMap[item.id] = item;
                    });
                }
            });

            // Sync persistent visibility - RESET first to ensure clean state based on Hospital persistence
            window.chartHiddenDatasets = new Set();
            flatItems.forEach(item => {
                if (window.hiddenHospCodes && window.hiddenHospCodes.has(item.hospCode)) {
                    window.chartHiddenDatasets.add(item.id);
                }
            });

            syncLegendStructure(flatItems);

            const modalHTML = `
                <div id="chartModal" class="modal" style="display:block;" onclick="if(event.target === this) closeChartModal()">
                    <div class="modal-content" style="max-width:1400px; width:95%; max-height:96vh; display:flex; flex-direction:column;">
                        <div class="modal-header">
                            <div style="flex: 1; display: flex; align-items: center; gap: 1rem;">
                                <div><h2 style="margin:0;">${mainLabel}</h2></div>
                                <div style="display:flex; gap: 0.5rem; margin-left: auto; margin-right: 2rem; align-items: center;">
                                    <div style="display:flex; gap:10px; margin-right: 1rem; border-right: 1px solid var(--border-color); padding-right: 1rem;">
                                        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="document.getElementById('showChartValues').click()"><label class="toggle-switch" onclick="event.stopPropagation()"><input type="checkbox" id="showChartValues" ${chartOptionsState.showValues ? 'checked' : ''} onchange="toggleChartOption('showValues')"><span class="slider"></span></label><span>แสดงค่า</span></div>
                                        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="document.getElementById('showChartDiff').click()"><label class="toggle-switch" onclick="event.stopPropagation()"><input type="checkbox" id="showChartDiff" ${chartOptionsState.showDiff ? 'checked' : ''} onchange="toggleChartOption('showDiff')"><span class="slider"></span></label><span>แสดงผลต่าง</span></div>
                                        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="document.getElementById('showChartAbbreviated').click()"><label class="toggle-switch" onclick="event.stopPropagation()"><input type="checkbox" id="showChartAbbreviated" ${chartOptionsState.useAbbreviated ? 'checked' : ''} onchange="toggleChartOption('useAbbreviated')"><span class="slider"></span></label><span>ย่อตัวเลข</span></div>
                                        <div style="display:flex; align-items:center; gap:8px; margin-left: 5px;">
                                            <select id="chartQuarterFilter" onchange="updateChartQuarterFilter()" style="padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 0.9rem; font-family: var(--font-th); font-weight: 600; cursor: pointer;">
                                                <option value="all" ${chartOptionsState.filterQuarter === 'all' ? 'selected' : ''}>ทุกไตรมาส</option>
                                                <option value="1" ${chartOptionsState.filterQuarter === '1' ? 'selected' : ''}>เฉพาะไตรมาส 1</option>
                                                <option value="2" ${chartOptionsState.filterQuarter === '2' ? 'selected' : ''}>เฉพาะไตรมาส 2</option>
                                                <option value="3" ${chartOptionsState.filterQuarter === '3' ? 'selected' : ''}>เฉพาะไตรมาส 3</option>
                                                <option value="4" ${chartOptionsState.filterQuarter === '4' ? 'selected' : ''}>เฉพาะไตรมาส 4</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div style="display:${isMulti ? 'none' : 'flex'}; gap: 0.5rem;">
                                         <button onclick="navigateChart(-1)" class="nav-btn">&larr; ก่อนหน้า</button>
                                         <button onclick="navigateChart(1)" class="nav-btn">ถัดไป &rarr;</button>
                                    </div>
                                </div>
                            </div>
                            <span class="close-modal" onclick="closeChartModal()" style="margin-left: 0;">✕</span>
                        </div>
                        <div class="modal-body" style="display: grid; grid-template-columns: 1fr 280px; gap: 2rem; overflow:hidden; flex:1;">
                            <div style="display:flex; flex-direction:column; min-height:0;">
                                <div style="flex:1; display:flex; position:relative;"><canvas id="comparisonChart"></canvas></div>
                            </div>
                            <div id="chartLegendContainer" style="overflow-y:auto; background:#f8fafc; padding:1rem; border-radius:8px;">
                                <!-- Dynamic Legend -->
                            </div>
                        </div>
                    </div>
                </div>`;

            const existing = document.getElementById('chartModal');
            if (existing) existing.remove();
            document.body.insertAdjacentHTML('beforeend', modalHTML);

            window.currentChartData = {
                code: typeof input === 'string' ? input : (indicators[0] ? indicators[0].code : ''),
                indicators: indicators,
                isMulti: isMulti,
                isBandChart: isBandChart,
                isVariableZoneChart: isVariableZoneChart,
                targetZones: targetZones,
                isSingleAreaChart: (window.currentChartData && window.currentChartData.isSingleAreaChart) || false,
                allChartData: allChartData,
                selectedHospitals: selectedHospitals,
                labels: labels,
                keys: keys,
                yearQuarterInfo: yearQuarterInfo,
                flatItemsMap: flatItemsMap, // Added
                options: { ...chartOptionsState }
            };
            renderComparisonChart();
            renderChartLegend(); // Initial Render
        }

        function renderComparisonChart() {
            if (!window.currentChartData) return;
            const { allChartData, selectedHospitals, labels, indicators, isMulti, isBandChart, isVariableZoneChart, isSingleAreaChart, targetZones } = window.currentChartData;
            const ctx = document.getElementById('comparisonChart');
            if (!ctx) return;

            const showValues = window.currentChartData.options.showValues;
            const showDiff = window.currentChartData.options.showDiff;
            const useAbbreviated = window.currentChartData.options.useAbbreviated;
            const filterQuarter = window.currentChartData.options.filterQuarter;

            const filteredLabels = filterQuarter === 'all'
                ? labels
                : labels.filter(l => l.endsWith(` Q${filterQuarter}`));

            const datasets = [];

            // Add Target Zones if applicable (Background layers)
            if (targetZones && targetZones.length > 0) {
                // Sort descending so larger zones draw first (behind)
                [...targetZones].sort((a, b) => b.max - a.max).forEach(zone => {
                    const zoneData = filteredLabels.map(() => zone.max);
                    datasets.push({
                        label: zone.label,
                        data: zoneData,
                        borderColor: 'transparent',
                        pointRadius: 0,
                        borderWidth: 0,
                        backgroundColor: zone.color || 'rgba(239, 68, 68, 0.15)',
                        fill: 'start', // Fill from bottom of scale up to value (colors the negative region if max=0)
                        hoverRadius: 0,
                        spanGaps: true,
                        order: 1000 // Draw behind everything
                    });
                });
            }

            if (isBandChart) {
                // Special rendering for Band Chart
                selectedHospitals.forEach((hosp, hIdx) => {
                    const actualCode = 'Actual';
                    const planCode = 'Plan';
                    const color = getChartColor(hIdx);

                    // Data Points
                    const actualData = filteredLabels.map(k => {
                        const d = allChartData[hosp.code][actualCode][k];
                        return d ? d.num : null;
                    });
                    const planData = filteredLabels.map(k => {
                        const d = allChartData[hosp.code][planCode][k];
                        return d ? d.num : null;
                    });
                    const planUpper = planData.map(v => v !== null ? v * 1.05 : null); // +5%
                    const planLower = planData.map(v => v !== null ? v * 0.95 : null); // -5%

                    // Check Visibility
                    const isHospHidden = window.hiddenHospCodes && window.hiddenHospCodes.has(hosp.code);
                    const actualHidden = isHospHidden || (window.chartHiddenDatasets && window.chartHiddenDatasets.has(`${hosp.code}|Actual`));
                    const planHidden = isHospHidden || actualHidden || (window.chartHiddenDatasets && window.chartHiddenDatasets.has(`${hosp.code}|Plan`));

                    // 1. Plan Upper (+5%) - Invisible line, defines top of area
                    datasets.push({
                        label: `${hosp.name} - Plan +5%`,
                        data: planUpper,
                        borderColor: 'transparent',
                        pointRadius: 0,
                        borderWidth: 0,
                        fill: false,
                        hidden: planHidden,
                        spanGaps: true,
                        hoverRadius: 0
                    });

                    // 2. Plan Lower (-5%) - Fills to Upper
                    datasets.push({
                        label: `${hosp.name} - Plan -5%`,
                        data: planLower,
                        borderColor: 'transparent',
                        pointRadius: 0,
                        borderWidth: 0,
                        backgroundColor: color + '25', // slightly increased opacity
                        fill: '-1', // Fill to previous dataset (Upper)
                        hidden: planHidden,
                        spanGaps: true,
                        hoverRadius: 0
                    });

                    // 3. Plan Line (Middle) - Dashed
                    datasets.push({
                        label: `${hosp.name} - Plan`,
                        data: planData,
                        borderColor: color,
                        borderWidth: 1.5,
                        borderDash: [4, 4],
                        pointRadius: 0, // No points for plan
                        fill: false,
                        hidden: planHidden,
                        spanGaps: true
                    });

                    // 4. Actual Line - Solid
                    datasets.push({
                        label: `${hosp.name} - Actual`,
                        data: actualData,
                        borderColor: color,
                        backgroundColor: color,
                        borderWidth: 2.5,
                        pointRadius: 4,
                        pointBackgroundColor: color,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        tension: 0.35,
                        fill: false,
                        hidden: actualHidden,
                        spanGaps: true,
                        _hospCode: hosp.code,
                        _indCode: 'Consolidated' // Match legend item code
                    });
                });

            } else if (isVariableZoneChart) {
                // Variable Zone Rendering (Main Line + Variable Reference Area)
                const uniqueRefAreas = new Map();
                selectedHospitals.forEach((hosp, hIdx) => {
                    const mainCode = 'Main';
                    const refCode = 'Ref';
                    const color = getChartColor(hIdx);

                    const mainData = filteredLabels.map(k => {
                        const d = allChartData[hosp.code][mainCode][k];
                        return d ? d.num : null;
                    });
                    const refData = filteredLabels.map(k => {
                        const d = allChartData[hosp.code][refCode][k];
                        return d ? d.num : null;
                    });

                    const isHospHidden = window.hiddenHospCodes && window.hiddenHospCodes.has(hosp.code);
                    const isHidden = isHospHidden || (window.chartHiddenDatasets && window.chartHiddenDatasets.has(`${hosp.code}|Main`));

                    const refLabel = indicators[1] ? indicators[1].label : 'Reference';
                    const refKey = JSON.stringify(refData);

                    if (!isHidden && !uniqueRefAreas.has(refKey)) {
                        uniqueRefAreas.set(refKey, { color, data: refData });
                    }

                    // 1. Reference Identity (Legend Only - No Line on Chart)
                    datasets.push({
                        label: `${hosp.name} - ${refLabel}`,
                        data: refData,
                        borderColor: 'transparent', // Keep for legend color
                        pointRadius: 0,
                        borderWidth: 0, // No border/line
                        fill: false,
                        hidden: isHidden,
                        spanGaps: true,
                        hoverRadius: 0,
                        order: 200
                    });

                    // 2. Main Line
                    datasets.push({
                        label: `${hosp.name} - Actual`,
                        data: mainData,
                        borderColor: color,
                        backgroundColor: color,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: color,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        tension: 0.35,
                        fill: false,
                        hidden: isHidden,
                        spanGaps: true,
                        order: 100,
                        _hospCode: hosp.code,
                        _indCode: 'Main' // Match legend item code
                    });
                });

                // 3. Shared Reference Areas (Deduplicated, Borderless)
                uniqueRefAreas.forEach((area, key) => {
                    datasets.push({
                        label: 'Ref Area Sync',
                        data: area.data,
                        borderWidth: 0, // No border line
                        borderColor: 'transparent',
                        pointRadius: 0,
                        backgroundColor: function (context) {
                            const chart = context.chart;
                            const { ctx, chartArea } = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                            gradient.addColorStop(0, area.color + '00');
                            gradient.addColorStop(1, area.color + '45');
                            return gradient;
                        },
                        fill: 'start',
                        spanGaps: true,
                        hoverRadius: 0,
                        order: 800 // Lowest layer
                    });
                });

            } else if (isSingleAreaChart) {
                // Single Item Area Chart (For Mean/Avg Sub-items)
                const uniqueFills = new Map();
                selectedHospitals.forEach((hosp, hIdx) => {
                    const ind = indicators[0];
                    const dataPoints = filteredLabels.map(k => {
                        const d = allChartData[hosp.code][ind.code][k];
                        return d ? d.num : null;
                    });
                    const color = getChartColor(hIdx);
                    const dsKey = `${hosp.code}|${ind.code}`;
                    const isHospHidden = window.hiddenHospCodes && window.hiddenHospCodes.has(hosp.code);
                    const isHidden = isHospHidden || (window.chartHiddenDatasets && window.chartHiddenDatasets.has(dsKey));

                    const dataKey = JSON.stringify(dataPoints);
                    if (!isHidden && !uniqueFills.has(dataKey)) {
                        uniqueFills.set(dataKey, { color, data: dataPoints });
                    }

                    // 1. Individual Identity (Legend Only - No Line/Points on Chart)
                    datasets.push({
                        label: hosp.name,
                        data: dataPoints,
                        borderColor: color,
                        borderWidth: 0, // No border
                        pointRadius: 0, // No points
                        fill: false,
                        tension: 0.35,
                        hidden: isHidden,
                        spanGaps: true,
                        order: 100,
                        _hospCode: hosp.code,
                        _indCode: ind.code
                    });
                });

                // 2. Shared Areas (Borderless)
                uniqueFills.forEach((area, key) => {
                    datasets.push({
                        label: 'Area Sync',
                        data: area.data,
                        borderWidth: 0, // No border line
                        borderColor: 'transparent',
                        backgroundColor: area.color + '55',
                        fill: 'start',
                        pointRadius: 0,
                        hoverRadius: 0,
                        spanGaps: true,
                        order: 800
                    });
                });

            } else {
                // Standard Rendering
                selectedHospitals.forEach((hosp, hIdx) => {
                    indicators.forEach((ind, iIdx) => {
                        const dataPoints = filteredLabels.map(k => {
                            const d = allChartData[hosp.code][ind.code][k];
                            return d ? d.num : null;
                        });
                        const globalIdx = hIdx * indicators.length + iIdx;

                                    if (label) label = label.replace(/ - Actual/, '').replace(/ - Plan/, ' (แผน)');

                                    if (context.parsed.y !== null) {
                                        const prevAbbr = window.useAbbreviatedNumbers;
                                        window.useAbbreviatedNumbers = useAbbreviated;
                                        label += ': ' + formatAbbreviated(context.parsed.y);

                                    return label;

                            },

                                callback: function (value) {
                                    const prevAbbr = window.useAbbreviatedNumbers;
                                    window.useAbbreviatedNumbers = useAbbreviated;
                                    const result = formatAbbreviated(value);
                                    window.useAbbreviatedNumbers = prevAbbr;
                                    return result;
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'customDataLabel',
                    afterDatasetsDraw(chart) {
                        if (!showValues && !showDiff) return;
                        const { ctx } = chart;
                        chart.data.datasets.forEach((dataset, i) => {
                            if (chart.isDatasetVisible(i) === false) return;
                            // Skip Plan Upper/Lower, Reference Area, and Group Average for labels to reduce clutter
                            if (dataset.label.includes('Plan') || dataset.label.includes('Reference') || dataset.label.includes('ค่ากลาง')) return;

                            const meta = chart.getDatasetMeta(i);
                            meta.data.forEach((element, index) => {
                                const val = dataset.data[index];
                                if (val === null || val === undefined) return;
                                const x = element.x;
                                const y = element.y;

                                ctx.save();
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'bottom';
                                ctx.font = 'bold 11px sans-serif';

                                if (showValues) {
                                    ctx.fillStyle = dataset.borderColor;
                                    const prevAbbr = window.useAbbreviatedNumbers;
                                    window.useAbbreviatedNumbers = useAbbreviated;
                                    ctx.fillText(formatAbbreviated(val), x, y - 8);
                                    window.useAbbreviatedNumbers = prevAbbr;
                                }
                                if (showDiff && index > 0) {
                                    // Calculate diff against ??? Previous Quarter of same dataset
                                    const prevVal = dataset.data[index - 1];
                                    if (prevVal !== null) {
                                        const diff = val - prevVal;
                                        const prevAbbr = window.useAbbreviatedNumbers;
                                        window.useAbbreviatedNumbers = useAbbreviated;
                                        const diffStr = (diff > 0 ? '+' : '') + formatAbbreviated(diff);
                                        window.useAbbreviatedNumbers = prevAbbr;

                                        ctx.fillStyle = diff >= 0 ? '#10b981' : '#ef4444';
                                        ctx.fillText(diffStr, x, showValues ? y - 22 : y - 8);
                                    }
                                }
                                ctx.restore();
                            });
                        });
                    }
                }]
            });
        }

        function toggleDatasetVisibility(element, hospCode, indCode) {
            if (!window.currentChartData) return;
            const { isBandChart } = window.currentChartData;

            if (!window.chartHiddenDatasets) window.chartHiddenDatasets = new Set();
            if (!window.hiddenHospCodes) window.hiddenHospCodes = new Set();

            const dsKey = `${hospCode}|${indCode}`;
            const currentHidden = window.chartHiddenDatasets.has(dsKey) || (hospCode && window.hiddenHospCodes.has(hospCode));

            if (!currentHidden) {
                // Hide
                if (isBandChart && indCode === 'Consolidated') {
                    window.chartHiddenDatasets.add(`${hospCode}|Actual`);
                    window.chartHiddenDatasets.add(`${hospCode}|Plan`);
                } else {
                    window.chartHiddenDatasets.add(dsKey);
                }
                if (hospCode) window.hiddenHospCodes.add(hospCode);
            } else {
                // Show
                if (isBandChart && indCode === 'Consolidated') {
                    window.chartHiddenDatasets.delete(`${hospCode}|Actual`);
                    window.chartHiddenDatasets.delete(`${hospCode}|Plan`);
                } else {
                    window.chartHiddenDatasets.delete(dsKey);
                }
                if (hospCode) window.hiddenHospCodes.delete(hospCode);
            }

            renderComparisonChart();
            renderChartLegend();
        }

        let animationFrameId = null;

        function highlightDataset(hospCode, indCode) {
            const chart = window.comparisonChartInstance;
            if (!chart) return;

            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            // Find the main identity/line dataset
            let targetDs = null;
            chart.data.datasets.forEach(ds => {
                if (ds._hospCode === hospCode && ds._indCode === indCode) {
                    targetDs = ds;
                }
            });

            if (!targetDs) return;

            // Highlight Logic: Apply running dashes and thickness
            chart.data.datasets.forEach(ds => {
                if (ds === targetDs) {
                    ds.borderWidth = 4;
                    ds.borderDash = [10, 5];
                    ds.order = 0; // Bring to absolute front
                    ds.opacity = 1;
                } else {
                    // Dim others slightly
                    if (ds.order !== 800) { // Don't dim background zones too much
                        ds.borderWidth = Math.min(ds.borderWidth, 2);
                    }
                }
            });

            const animateDash = () => {
                if (targetDs) {
                    targetDs.borderDashOffset = (targetDs.borderDashOffset || 0) - 1;
                    chart.update('none');
                    animationFrameId = requestAnimationFrame(animateDash);
                }
            };
            animateDash();
        }

        function resetHighlight() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            const chart = window.comparisonChartInstance;
            if (!chart) return;

            chart.data.datasets.forEach(ds => {
                ds.borderDash = [];
                ds.borderDashOffset = 0;

                // 800: Area Fills, 200: Hidden Reference Lines
                if (ds.order === 800 || ds.order === 200) {
                    ds.borderWidth = 0;
                } else if (ds._indCode === 'Main' || ds._indCode === 'Actual' || ds._indCode === 'Consolidated') {
                    ds.borderWidth = 3;
                    ds.order = 100;
                } else {
                    // Standard lines or Plan lines
                    ds.borderWidth = (ds.label && ds.label.includes('Plan')) ? 1.5 : 2.5;
                    ds.order = (ds.label && ds.label.includes('Plan')) ? 150 : 100;
                }
            });
            chart.update('none');
        }

        function navigateChart(direction) {
            if (!window.currentChartData) return;

            // Handle Report Chart Navigation
            if (window.currentChartData.isReportChart) {
                const reportTypes = ['1.3.1.1', '1.3.1.2', '1.3.1.3', '1.3.1.4', '1.3.1.5', '1.3.1.6', '1.3.3.1', '1.3.3.2', '2.1.1', '2.1.2', '2.1.3'];
                const curType = window.currentChartData.reportType;
                const curIdx = reportTypes.indexOf(curType);
                if (curIdx === -1) return;
                let nextIdx = (curIdx + direction + reportTypes.length) % reportTypes.length;
                openReportItemChart(reportTypes[nextIdx]);
                return;
            }

            if (!window.chartableItems || window.currentChartData.isMulti) return;
            const curCode = window.currentChartData.code;
            const items = window.chartableItems;
            const curIdx = items.findIndex(it => it.header === curCode);

            if (curIdx === -1) {
                console.warn('Current chart code not found in navigation list:', curCode);
                return;
            }

            let nextIdx = (curIdx + direction + items.length) % items.length;
            const nextItem = items[nextIdx];
            openChartModal(nextItem.header, nextItem.label, null, 'tps');
        }

            return colors[index % colors.length];
        }

                            title: "1.3.2 คะแนนตรวจสอบงบทดลองเบื้องต้น",
                            checkHeader: "1.3.2 คะแนนตรวจสอบงบทดลองเบื้องต้น",
                            subIndicators: [
                                { header: "S_1.3.2_ผลรวมแม่ข่าย", label: "คะแนนตรวจสอบงบทดลองเบื้องต้น" }
                            ]
                        },
                        {
                            subHeading: "1.3.3 ผลผลิต (Productivity) เป็นที่ยอมรับ",
                            title: `1.3.3.1 อัตราครองเตียงผู้ป่วยใน ≥ 80 % <button class="chart-btn" onclick="event.stopPropagation(); openReportItemChart('1.3.3.1')" title="ดูแนวโน้ม">📊</button>`,
                            checkHeader: "1.3.3.1 อัตราครองเตียงผู้ป่วยใน ≥ 80 %",
                            subIndicators: [
                                { header: "S_1.3.3.1_อัตราครองเตียง", label: "อัตราครองเตียง (%)" }
                            ],
                            sortOrder: "asc"
                        },
                        {
                            title: `1.3.3.2 SumAdjRW เกินค่ากลางกลุ่มรพ. หรือเพิ่มขึ้น 5 % <button class="chart-btn" onclick="event.stopPropagation(); openReportItemChart('1.3.3.2')" title="ดูแนวโน้ม">📊</button>`,
                            checkHeader: "1.3.3.2 SumAdjRW เกินค่ากลางกลุ่มรพ. หรือเพิ่มขึ้น 5 %",
                            subIndicators: [
                                { header: "S_1.3.3.2_Sum AdjRW", label: "Sum AdjRW" },
                                { header: "S_1.3.3.2_ค่ากลางกลุ่ม AdjRW", label: "ค่ากลางกลุ่ม AdjRW" }
                            ],
                            sortType: 'sumAdjRWPct',
                            diffSource: ["S_1.3.3.2_Sum AdjRW", "S_1.3.3.2_ค่ากลางกลุ่ม AdjRW"]
                        }
                    ]
                },
                {
                    section: "2. ตัวชี้วัดผลลัพท์การดำเนินงาน",
                    items: [
                        {
                            subHeading: "2.1 ความสามารถในการทำกำไร",
                            title: `2.1.1 ประสิทธิภาพในการดำเนินงาน (Operating Margin) <button class="chart-btn" onclick="event.stopPropagation(); openReportItemChart('2.1.1')" title="ดูแนวโน้ม">📊</button>`,
                            checkHeader: "2.1.1 ประสิทธิภาพในการดำเนินงาน",
                            subIndicators: [
                                { header: "S_2.1.1_ค่ากลางOperating Margin %", label: "ค่ากลาง Operating Margin" },
                                { header: "S_2.1.1_Operating Margin %", label: "Operating Margin" }
                            ],
                            sortType: 'lcColor',
                            sortHeader: "S_2.1.1_Operating Margin %"
                        },
                        {
                            title: `2.1.2 อัตราผลตอบแทนจากสินทรัพย์ (Return on Asset) <button class="chart-btn" onclick="event.stopPropagation(); openReportItemChart('2.1.2')" title="ดูแนวโน้ม">📊</button>`,
                            checkHeader: "2.1.2 อัตราผลตอบแทนจากสินทรัพย์",
                            subIndicators: [
                                { header: "S_2.1.2_ค่ากลางReturn on Asset %", label: "ค่ากลาง Return on Asset" },
                                { header: "S_2.1.2_Return on Asset %", label: "Return on Asset" }
                            ],
                            sortType: 'lcColor',
                            sortHeader: "S_2.1.2_Return on Asset %"
                        },
                        {
                            title: `2.1.3 ผลกำไรขาดทุนก่อนหักค่าเสื่อม (EBITDA) ≥0 (1 คะแนน) <button class="chart-btn" onclick="event.stopPropagation(); openReportItemChart('2.1.3')" title="ดูแนวโน้ม">📊</button>`,
                            checkHeader: "2.1.3 ผลกำไรขาดทุนก่อนหักค่าเสื่อม",
                            subIndicators: [
                                { header: "S_2.1.3_EBITDA", label: "EBITDA" }
                            ],
                            sortType: 'lcColor',
                            sortHeader: "S_2.1.3_EBITDA"
                        },
                        {
                            subHeading: "2.2 การวัดสภาพคล่องทางการเงิน",
                            title: "2.2.1 ทุนสำรองสุทธิ (Net Working Capital) ≥0",
                            checkHeader: "2.2.1 ทุนสำรองสุทธิ",
                            subIndicators: [
                                { header: "S_2.2.1_ทุนสำรองสุทธิ(Networking Capital)", label: "ทุนสำรองสุทธิ(Networking Capital)" }
                            ],
                            sortType: 'lcColor',
                            sortHeader: "S_2.2.1_ทุนสำรองสุทธิ(Networking Capital)"
                        },
                        {
                            title: "2.2.2 Cash Ratio ≥0.8",
                            checkHeader: "2.2.2 Cash Ratio",
                            subIndicators: [
                                { header: "S_2.2.2_Cash R", label: "Cash Ratio" }
                            ],
                            sortType: 'lcColor',
                            sortHeader: "S_2.2.2_Cash R"
                        }
                    ]
                }
            ];

            let html = "";
            reportStructure.forEach(sec => {
                html += `<div class="report-section"><div class="report-section-title">${sec.section}</div>`;
                sec.items.forEach(item => {
                    if (item.subHeading) {
                        html += `<div style="background: #f1f5f9; padding: 0.8rem 1.5rem; font-weight: 600; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-size: 0.95rem;">${item.subHeading}</div>`;
                    }
                    const passGroup = [];
                    const failGroup = [];

                    cols.forEach(hospital => {
                        if (hospital.isLoading) return;
                        const allRows = Object.values(hospital.data);
                        let targetRow = null;
                        if (allRows.length > 0) {
                            const h = hospital.headersMap ? (hospital.headersMap[comparisonYear] || sourceHeaders) : sourceHeaders;
                            let yIdx = h ? h.findIndex(sh => String(sh).trim() === 'ปี') : 2;
                            let qIdx = h ? h.findIndex(sh => String(sh).trim() === 'ไตรมาส') : 3;

                            for (let r of allRows) {
                                if (String(r[yIdx] || "").trim() === String(comparisonYear) && String(r[qIdx] || "").trim() === String(quarter)) {
                                    targetRow = r;
                                    break;
                                }
                            }
                        }

                        if (targetRow) {
                            const h = hospital.headersMap ? (hospital.headersMap[comparisonYear] || sourceHeaders) : sourceHeaders;
                            let isFail = false;

                            if (item.title && item.title.startsWith("1.2.1")) {
                                // Special Logic for 1.2.1: Driven by Cash Ratio
                                const cashRRaw = getCell(targetRow, "S_2.2.2_Cash R", h);
                                const periodRaw = getCell(targetRow, "S_1.2.1_ระยะเวลาชำระเจ้าหนี้การค้ายา&เวชภัณฑ์มิใช่ยา", h);
                                const cashR = parseFloat(String(cashRRaw).replace(/,/g, ''));
                                const period = parseFloat(String(periodRaw).replace(/,/g, ''));

                                if (isNaN(cashR) || isNaN(period)) {
                                    isFail = true;
                                } else {
                                    if (cashR < 0.8) {
                                        // Cash R < 0.8 => Period must be <= 180
                                        isFail = period > 180;
                                    } else {
                                        // Cash R >= 0.8 => Period must be <= 90
                                        isFail = period > 90;
                                    }
                                }
                            } else {
                                // Standard Logic
                                const checkValRaw = getCell(targetRow, item.checkHeader, h);
                                const checkValNum = parseFloat(String(checkValRaw).replace(/,/g, ''));
                                isFail = checkValRaw === 0 || checkValRaw === "0" || checkValNum === 0 || isNaN(checkValNum) || checkValRaw === "Fail";
                            }

                            const subValues = item.subIndicators.map(si => {
                                let rawVal = getCell(targetRow, si.header, h);
                                let formattedVal = formatValue(rawVal);
                                let num = parseFloat(formattedVal.replace(/,/g, ''));
                                // LC/MC Invert Sign for Difference
                                if (item.sortType === 'lcInvert' && si.header.includes('ผลต่าง')) {
                                    num = -num;
                                    formattedVal = formatValue(num);
                                }
                                return { label: si.label, value: formattedVal, numeric: isNaN(num) ? -999999 : num };
                            });

                            if ((item.sortType === 'unitCostPct' || item.sortType === 'sumAdjRWPct') && item.diffSource) {
                                const val1 = parseFloat(String(getCell(targetRow, item.diffSource[0], h)).replace(/,/g, '')) || 0;
                                const val2 = parseFloat(String(getCell(targetRow, item.diffSource[1], h)).replace(/,/g, '')) || 0;
                                let pct = 0;
                                if (item.sortType === 'unitCostPct') pct = val2 === 0 ? 0 : ((val2 - val1) / val2) * 100;
                                else pct = val2 === 0 ? 0 : ((val1 - val2) / val2) * 100;
                                subValues.push({ label: "ผลต่าง (%)", value: formatNumberWithoutRounding(pct) + "%", numeric: pct });
                            }

                            let sortVal = 0;
                            if (item.sortType === 'unitCostPct' || item.sortType === 'sumAdjRWPct') sortVal = subValues[subValues.length - 1].numeric;
                            else if (item.sortHeader) sortVal = parseFloat(String(getCell(targetRow, item.sortHeader, h)).replace(/,/g, '')) || 0;
                            else if (subValues.length > 0) sortVal = subValues[0].numeric;

                            const hData = { name: hospital.name, subValues, sortVal };
                            if (isFail) failGroup.push(hData);
                            else passGroup.push(hData);
                        }
                    });

                    const sortFunc = (group, isPass) => {
                        const type = item.sortType;
                        group.sort((a, b) => {
                            if (type === 'ascFailDesc') return isPass ? (a.sortVal - b.sortVal) : (b.sortVal - a.sortVal);
                            else if (type === 'nearZero') return isPass ? (Math.abs(a.sortVal) - Math.abs(b.sortVal)) : (Math.abs(b.sortVal) - Math.abs(a.sortVal));
                            else if (['unitCostPct', 'sumAdjRWPct', 'lcColor', 'mcColorRed'].includes(type)) return isPass ? (b.sortVal - a.sortVal) : (a.sortVal - b.sortVal);
                            else if (type === 'lcInvert') return isPass ? (a.sortVal - b.sortVal) : (b.sortVal - a.sortVal);
                            else return (a.sortVal - b.sortVal) * (item.sortOrder === 'asc' ? 1 : -1);
                        });
                    };
                    sortFunc(passGroup, true);
                    sortFunc(failGroup, false);

                    let headersHTML = item.subIndicators.map(si => `<th>${si.label}</th>`).join('');
                    if (item.sortType === 'unitCostPct' || item.sortType === 'sumAdjRWPct') headersHTML += `<th>ผลต่าง(%)</th>`;

                    const renderTable = (group, isPass) => {
                        if (group.length === 0) return `<div style="color:#94a3b8; font-size:0.85rem; text-align:center; padding:10px;">- ทุกหน่วยงาน${isPass ? 'ไม่ผ่าน' : 'ผ่าน'} -</div>`;
                        return `<div style="overflow-x: auto; width: 100%;"><table class="report-table"><thead><tr><th class="hospital-name-cell">โรงพยาบาล</th>${headersHTML}</tr></thead><tbody>` +
                            group.map(g => `<tr><td>${g.name}</td>` + g.subValues.map(sv => `<td>${sv.value}</td>`).join('') + `</tr>`).join('') +
                            `</tbody></table></div>`;
                    };

                    html += `
                        <div class="report-item">
                            <div class="report-item-header">${item.title}</div>
                            <div class="report-grid">
                                <div class="report-col pass"><div class="report-col-title" style="color:#10b981;">ผ่าน (${passGroup.length})</div>${renderTable(passGroup, true)}</div>
                                <div class="report-col fail"><div class="report-col-title" style="color:#ef4444;">ไม่ผ่าน (${failGroup.length})</div>${renderTable(failGroup, false)}</div>
                            </div>
                        </div>`;
                });
                html += `</div>`;
            });
            container.innerHTML = html;
        }




        function openReportItemChart(type) {
            if (!comparisonList || comparisonList.length === 0) return;

            const configMap = {
                '1.3.1.1': { mainCode: 'S_1.3.1.1_ต้นทุนบริการผู้ป่วยนอกต่อครั้ง', refCode: 'S_1.3.1.1_Mean+1SD', label: 'Unit Cost OP', isVariable: true },
                '1.3.1.2': { mainCode: 'S_1.3.1.2_ต้นทุนบริการผู้ป่วยในต่อ AdjRW', refCode: 'S_1.3.1.2_Mean+1SD', label: 'Unit Cost IP', isVariable: true },
                '1.3.1.3': { mainCode: 'S_1.3.1.3_LC', refCode: 'S_1.3.1.3_Avg#LC', label: 'LC ค่าแรง', isVariable: true },
                '1.3.1.4': { mainCode: 'S_1.3.1.4_ค่ายา', refCode: 'S_1.3.1.4_Avg#ค่ายา', label: 'ค่ายา', isVariable: true },
                '1.3.1.5': { mainCode: 'S_1.3.1.5_ค่าวัสดุวิทยาศาสตร์และการแพทย์', refCode: 'S_1.3.1.5_Avg#ค่าวัสดุวิทยาศาสตร์และการแพทย์', label: 'ค่าวัสดุวิทย์ฯ', isVariable: true },
                '1.3.1.6': { mainCode: 'S_1.3.1.6_ค่าเวชภัณฑ์มิใช่ยาและวัสดุการแพทย์', refCode: 'S_1.3.1.6_Avg#ค่าเวชภัณฑ์มิใช่ยาและวัสดุการแพทย์', label: 'ค่าเวชภัณฑ์มิใช่ยา', isVariable: true },
                '1.3.3.1': { mainCode: 'S_1.3.3.1_อัตราครองเตียง', targetZones: [{ max: 80, label: 'Target 80%', color: '#fef08a40' }], label: 'อัตราครองเตียง' },
                '1.3.3.2': { mainCode: 'S_1.3.3.2_Sum AdjRW', refCode: 'S_1.3.3.2_ค่ากลางกลุ่ม AdjRW', label: 'SumAdjRW', isVariable: true },
                '2.1.1': { mainCode: 'S_2.1.1_Operating Margin %', refCode: 'S_2.1.1_ค่ากลางOperating Margin %', label: 'Operating Margin %', isVariable: true },
                '2.1.2': { mainCode: 'S_2.1.2_Return on Asset %', refCode: 'S_2.1.2_ค่ากลางReturn on Asset %', label: 'Return on Asset %', isVariable: true },
                '2.1.3': { mainCode: 'รายได้ (ไม่รวมงบลงทุน) หัก ค่าใช้จ่าย (ไม่รวมค่าเสื่อมราคาและค่าตัดจำหน่าย) EBITDA', targetZones: [{ max: 0, label: 'Loss Area (Negative)', color: 'rgba(239, 68, 68, 0.15)' }], label: 'EBITDA' }
            };

            const config = configMap[type];
            if (!config) return;

            const selectedHospitals = comparisonList.map(h => ({ name: h.name, code: h.code || h.name }));
            const allChartData = {};
            const allKeys = new Set();
            const yearQuarterInfo = {};

            const getCellVal = (row, header, headers) => {
                const idx = headers.findIndex(h => String(h).trim() === header.trim());
                if (idx === -1) return NaN;
                const val = row[idx];
                return parseFloat(String(val).replace(/,/g, ''));
            };

            selectedHospitals.forEach((h, idx) => {
                const hospData = comparisonList[idx];
                allChartData[h.code] = {};

                if (config.isVariable) {
                    allChartData[h.code]['Main'] = {};
                    allChartData[h.code]['Ref'] = {};
                } else {
                    allChartData[h.code]['Main'] = {};
                }

                const headersMap = hospData.headersMap || {};
                const headers = headersMap[Object.keys(headersMap)[0]] || sourceHeaders;
                if (!headers) {
                    console.warn('No headers found for hospital:', h.code);
                    return;
                }
                let yIdx = headers.findIndex(sh => String(sh).trim() === 'ปี');
                let qIdx = headers.findIndex(sh => String(sh).trim() === 'ไตรมาส');
                if (yIdx === -1) yIdx = 2;
                if (qIdx === -1) qIdx = 3;

                const rows = Object.values(hospData.data || {});
                rows.forEach(r => {
                    const year = r[yIdx];
                    const quarter = r[qIdx];
                    if (!year || !quarter) return;
                    const key = `${year} Q${quarter}`;
                    allKeys.add(key);
                    yearQuarterInfo[key] = { year, quarter };

                    const valMain = getCellVal(r, config.mainCode, headers);
                    if (config.isVariable) {
                        const valRef = getCellVal(r, config.refCode, headers);
                        if (!isNaN(valMain)) allChartData[h.code]['Main'][key] = { num: valMain };
                        if (!isNaN(valRef)) allChartData[h.code]['Ref'][key] = { num: valRef };
                    } else {
                        if (!isNaN(valMain)) allChartData[h.code]['Main'][key] = { num: valMain };
                    }
                });
            });

            const keys = Array.from(allKeys).sort((a, b) => {
                const partsA = a.split(' ');
                const partsB = b.split(' ');
                const yA = parseInt(partsA[0]);
                const yB = parseInt(partsB[0]);
                if (yA !== yB) return yA - yB;
                return partsA[1].localeCompare(partsB[1]);
            });

            const flatItemsMap = {};
            selectedHospitals.forEach((h, hIdx) => {
                const color = getChartColor(hIdx);
                const itemId = `${h.code}|Main`;
                flatItemsMap[itemId] = {
                    id: itemId,
                    hospCode: h.code,
                    indCode: 'Main',
                    label: h.name,
                    color: color,
                    globalIdx: hIdx
                };
            });

            const indicators = config.isVariable ? [
                { code: 'Main', label: config.label },
                { code: 'Ref', label: 'Reference' }
            ] : [{ code: 'Main', label: config.label }];

            window.currentChartData = {
                code: 'REPORT_CHART',
                isReportChart: true,
                reportType: type,
                indicators: indicators,
                isMulti: false,
                isBandChart: false,
                isVariableZoneChart: config.isVariable || false,
                targetZones: config.targetZones || [],
                allChartData: allChartData,
                selectedHospitals: selectedHospitals,
                labels: keys,
                keys: keys,
                yearQuarterInfo: yearQuarterInfo,
                flatItemsMap: flatItemsMap,
                options: { ...chartOptionsState } // Use global state
            };

            const modalHTML = `
                <div id="chartModal" class="modal" style="display:block;" onclick="if(event.target === this) closeChartModal()">
                    <div class="modal-content" style="max-width:1400px; width:95%; max-height:96vh; display:flex; flex-direction:column;">
                        <div class="modal-header">
                            <div style="flex: 1; display: flex; align-items: center; gap: 1rem;">
                                <h2 style="margin:0;">${config.label} Analysis</h2>
                                <div style="display:flex; gap: 0.5rem; margin-left: auto; margin-right: 2rem; align-items: center;">
                                    <div style="display:flex; gap: 1rem; align-items: center; border-right: 1px solid var(--border-color); padding-right: 1rem; margin-right: 1rem;">
                                        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="document.getElementById('showChartValues').click()">
                                            <label class="toggle-switch" onclick="event.stopPropagation()">
                                                <input type="checkbox" id="showChartValues" ${chartOptionsState.showValues ? 'checked' : ''} onchange="toggleChartOption('showValues')">
                                                <span class="slider"></span>
                                            </label>
                                            <span style="font-size:0.9rem; font-weight:600;">แสดงค่า</span>
                                        </div>
                                        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="document.getElementById('showChartDiff').click()">
                                            <label class="toggle-switch" onclick="event.stopPropagation()">
                                                <input type="checkbox" id="showChartDiff" ${chartOptionsState.showDiff ? 'checked' : ''} onchange="toggleChartOption('showDiff')">
                                                <span class="slider"></span>
                                            </label>
                                            <span style="font-size:0.9rem; font-weight:600;">แสดงผลต่าง</span>
                                        </div>
                                        <div style="display:flex; align-items:center; gap:8px; cursor:pointer;" onclick="document.getElementById('showChartAbbreviated').click()">
                                            <label class="toggle-switch" onclick="event.stopPropagation()">
                                                <input type="checkbox" id="showChartAbbreviated" ${chartOptionsState.useAbbreviated ? 'checked' : ''} onchange="toggleChartOption('useAbbreviated')">
                                                <span class="slider"></span>
                                            </label>
                                            <span style="font-size:0.9rem; font-weight:600;">ย่อตัวเลข</span>
                                        </div>
                                    </div>
                                    <div style="display:flex; gap: 0.5rem;">
                                         <button onclick="navigateChart(-1)" class="nav-btn">&larr; ก่อนหน้า</button>
                                         <button onclick="navigateChart(1)" class="nav-btn">ถัดไป &rarr;</button>
                                    </div>
                                </div>
                            </div>
                            <span class="close-modal" onclick="closeChartModal()">✕</span>
                        </div>
                        <div class="modal-body" style="display: grid; grid-template-columns: 1fr 280px; gap: 2rem; overflow:hidden; flex:1;">
                            <div style="display:flex; flex-direction:column; min-height:0;">
                                <div style="flex:1; display:flex; position:relative;"><canvas id="comparisonChart"></canvas></div>
                            </div>
                            <div id="chartLegendContainer" style="overflow-y:auto; background:#f8fafc; padding:1rem; border-radius:8px;"></div>
                        </div>
                    </div>
                </div>`;

            const existing = document.getElementById('chartModal');
            if (existing) existing.remove();
            document.body.insertAdjacentHTML('beforeend', modalHTML);

            // Sync persistent visibility state
            Object.values(flatItemsMap).forEach(item => {
                if (window.hiddenHospCodes && window.hiddenHospCodes.has(item.hospCode)) {
                    window.chartHiddenDatasets.add(item.id);
                }
            });

            syncLegendStructure(Object.values(flatItemsMap));
            renderComparisonChart();
            renderChartLegend();
        }

        window.openReportItemChart = openReportItemChart;
        // --- End ---
    </script>
</body>

</html>
